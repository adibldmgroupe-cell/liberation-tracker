name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install poppler-utils (PDF → PNG)
        run: sudo apt-get install -y poppler-utils
      - name: Convert PDF plans to PNG (page 1 uniquement, nom fixe)
        run: |
          pdftoppm -r 150 -png -f 1 -l 1 public/plans/P004.pdf /tmp/p004
          mv /tmp/p004*.png public/plans/P004_plan.png
          pdftoppm -r 150 -png -f 1 -l 1 public/plans/P027.pdf /tmp/p027
          mv /tmp/p027*.png public/plans/P027_plan.png
          echo "=== Plans générés ===" && ls -lh public/plans/*.png
      - run: npm install
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_SERVICE_KEY: ${{ secrets.VITE_SUPABASE_SERVICE_KEY }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
